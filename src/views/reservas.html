<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/inicio.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/reservas.css">
    <title>Reservas</title>
</head>

<body>
    <div id="header"></div>

    <main>
        <section class="reservasCnt">
            <h1>Reservar un turno</h1>
            <form class="input" id="reservas">
                <div>
                    <label for="nombreCliente" class="obligatorio">Nombre del cliente</label>
                    <input type="text" name="" id="nombreCliente">
                </div>
                <div>
                    <label for="celular" class="obligatorio">Celular</label>
                    <input type="text" name="" id="celular">
                </div>
                <div>
                    <label for="correo" class="obligatorio">Email</label>
                    <input type="email" name="" id="correo">
                </div>
                <div>
                    <label for="nombreMascota" class="obligatorio">Nombre de la mascota</label>
                    <input type="text" name="" id="nombreMascota">
                </div>
                <div>
                    <label for="slcServicio" class="obligatorio">Tipo de Servicio</label>
                    <select name="" id="slcServicio">
                        <option value="0">- Seleccione un servicio -</option>
                        <option value="Veterinaria">Veterinaria</option>
                        <option value="Banio">Baño</option>
                        <option value="Estetica">Estética</option>
                    </select>
                </div>
                <div>
                    <label for="slcProfesional">Profesional (opcional)</label>
                    <select name="" id="slcProfesional">
                        <option value="0">- Seleccione un profesional -</option>
                        <option value="JuanaAlvarez">Juana Alvárez</option>
                        <option value="PedroAcosta">Pedro Acosta</option>
                        <option value="SofiaPerez">Sofia Pérez</option>
                    </select>
                </div>
                <div>
                    <label for="fecha" class="obligatorio">Fecha</label>
                    <input type="date" name="" id="fecha">
                </div>
                <div>
                    <label for="slcHora" class="obligatorio">Hora</label>
                    <select name="" id="slcHora">
                    </select>
                </div>
                <input type="submit" value="Agendar" id="btnReservas">
            </form>
            <p id="pResultado"></p>

        </section>
    </main>

    <div id="footer"></div>

    <script src="/src/app.js"></script>
    <script src="/src/core/reservas.js"></script>
</body>

</html>
