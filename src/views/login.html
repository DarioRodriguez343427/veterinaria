<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/inicio.css" />
    <link rel="stylesheet" href="/css/login.css">
    <title>Login</title>
</head>
<body>
    <div id="header"></div>

    <div class="container">
        <div class="loginCnt">
            <h1>Iniciar Sesión</h1>
            <form class="input" id="login">
                <div>
                    <label for="usuario">Usuario</label>
                    <input type="text" name="usuario" id="usuario" placeholder="">
                </div>
                <div>
                    <label for="contrasena">Contraseña</label>
                    <input type="password" name="password" id="contrasena" placeholder="********">
                </div>
                
                <input type="submit" value="Ingresar" id="btnLogin"> 
            </form>
            <p id="txtMensajeLogin"></p>
        </div>
    </div>

    <div id="footer"></div>

    <script src="/src/app.js"></script>
    <script src="/src/core/login.js"></script>
</body>
</html>
